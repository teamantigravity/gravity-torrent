name: Deploy website
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose an environment to deploy to: <preview|production>"
        required: true
        default: "preview"
jobs:
  deploy:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: ./www
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Install jaspr CLI
        run: dart pub global activate jaspr_cli

      - name: Build (jaspr static)
        run: jaspr build --verbose

      - name: Publish
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./www/build/jaspr --project-name=gravitytorrent-site --branch=${{ github.event.inputs.environment == 'production' && 'main' || 'preview' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
