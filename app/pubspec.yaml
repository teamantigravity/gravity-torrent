name: gravity_torrent
description: "Gravity Torrent — stream and download torrents on all your devices"

publish_to: "none"
version: 2.0.0+3

environment:
  sdk: ">=3.5.3 <4.0.0"
  flutter: ">=3.44.0 <4.0.0"


dependencies:
  flutter:
    sdk: flutter
  flutter_libtransmission:
    # TODO(TICKET-002): Fork under your own org and switch to pub.dev once patches are upstreamed.
    # Last audited: 2025-06-XX — diff reviewed against upstream v1.2.0
    git:
      url: "https://github.com/G-Ray/flutter_libtransmission"
      ref: 9df6293cac3f33241d0f95e4a51775a66620b27b

  cupertino_icons: ^1.0.9
  go_router: ^17.3.0
  pretty_bytes: ^6.3.0
  flutter_slidable: ^4.0.3
  duration: ^4.0.3
  open_file: ^4.0.0
  path: ^1.9.1
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  # TODO(TICKET-003): beta.7 is required for Android 15 fixes; switch to latest stable once released.
  file_picker: ^12.0.0-beta.7
  path_provider: ^2.1.6
  convex_bottom_bar: ^3.2.0
  flutter_svg: ^2.3.0
  yaru: ^10.2.0
  handy_window: ^0.4.2
  fuzzywuzzy: ^1.2.0
  flutter_local_notifications: ^22.0.1
  app_links:
    # TODO(TICKET-004): Fork under your own org and switch to official app_links once the needed fix is merged.
    # Last audited: 2025-06-XX — diff reviewed against upstream v3.x
    git:
      url: "https://github.com/G-Ray/app_links"
      path: app_links
      ref: d1aa2be128708e976dc88154854355217a3ff9c4
  content_resolver: ^0.3.6
  permission_handler: ^12.0.3
  external_path: ^2.2.0
  device_info_plus: ^13.2.0
  collection: ^1.19.1
  share_plus: ^13.2.1
  mime: ^2.0.0
  package_info_plus: ^10.2.1
  url_launcher: ^6.3.2
  window_manager: ^0.5.2
  xml: ^7.0.1
  pub_semver: ^2.2.0
  win32_registry: ^3.0.3
  store_checker: ^1.8.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  async: ^2.13.1
  connectivity_plus: ^6.1.5
  battery_plus: ^6.0.2
  tray_manager: ^0.5.3
  windows_store: ^1.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.3.0
  http: ^1.6.0
  crypto: ^3.0.7
  dynamic_color: ^1.8.1
  flutter_adaptive_scaffold: ^0.3.3+1
  audio_service: ^0.18.19
  fl_chart: ^1.2.0
  local_auth: ^3.0.2
  flutter_secure_storage: ^10.3.1
  get_it: ^9.2.1
  shelf: ^1.4.2
  qr_flutter: ^4.1.0
  quick_actions: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  test: ^1.31.0
  msix: ^3.18.0
  inno_bundle: ^0.11.2
  flutter_launcher_icons: ^0.14.4
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  generate: true # for l10n

  assets:
    - assets/

msix_config:
  display_name: Gravity Torrent
  publisher_display_name: Team Antigravity
  identity_name: TeamAntigravity.GravityTorrent
  logo_path: assets/icon.png
  publisher: CN=Team Antigravity, OID.2.25.311729368913984317654407730594956997722=1
  output_name: "Gravity Torrent"
  executable_file_name: "gravity_torrent.exe"
  # protocol and file extensions handling are managed programmatically
  # This is not perfect as registry entries will not be clean once the
  # app is uninstall.
  # protocol_activation: magnet
  # file_extension: .torrent
  capabilities: internetClientServer, privateNetworkClientServer
  trim_logo: "false"
  sign_msix: false

inno_bundle:
  id: 9FB02A40-50B6-49F9-92D4-AA9DC9AC1AAB
  name: Gravity Torrent
  executable_name: "Gravity Torrent"
  publisher: Team Antigravity
  url: https://teamantigravity.vercel.app/
  support_url: https://github.com/teamantigravity/gravity-torrent
  updates_url: https://github.com/teamantigravity/gravity-torrent/releases
  icon: windows/runner/resources/app_icon.ico
  languages:
    - english

# Force the latest standalone versions of transitive packages. These are newer
# than the versions the Flutter SDK / flutter_test currently resolve, so they
# are pinned here on request.
dependency_overrides:
  _fe_analyzer_shared: 105.0.0
  analyzer: 14.1.0
  assorted_layout_widgets: 12.6.2
  cli_util: 0.5.1
  flutter_secure_storage_darwin: 0.4.0
  hooks: 2.1.0
  intl: 0.20.3
  matcher: 0.12.20
  meta: 1.19.0
  package_config: 3.0.0
  record_use: 1.0.0
  test: 1.31.2
  test_api: 0.7.13
  test_core: 0.6.19
  vector_math: 2.4.0

